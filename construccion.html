<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Construcción | IAO</title>
    <!-- Manrope Font -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#fc521f',
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome for the hard hat icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle, #4a4a4a 0%, #1a1a1a 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>
    <div class="flex flex-col items-center">
        <!-- Helmet Icon -->
        <i class="fas fa-hard-hat text-[120px] text-brand-orange mb-8 drop-shadow-2xl"></i>
        
        <!-- Main Title -->
        <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-4 uppercase drop-shadow-md">
            Sitio en <span class="text-brand-orange">Construccion</span>
        </h1>
        
        <!-- Subtitles -->
        <div class="space-y-1">
            <p class="text-brand-orange text-lg md:text-xl font-semibold uppercase tracking-wide">Estamos mejorando el sitio</p>
            <p class="text-white text-md md:text-lg font-semibold uppercase tracking-wide opacity-90">Visitanos mas tarde</p>
        </div>
        
        <!-- Back button (optional, but good UX) -->
        <a href="index.html" class="mt-12 px-6 py-2 border-2 border-white text-white font-bold rounded hover:bg-white hover:text-black transition-colors">Volver al Inicio</a>
    </div>
</body>
</html>
